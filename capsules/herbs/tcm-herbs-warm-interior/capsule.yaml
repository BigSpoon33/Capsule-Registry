class_id: "7645594c-8737-42f4-ad0d-78c10b53701a"
version: "0.1.0"
title: "Herbs that Warm the Interior and Expel Cold"
description: "Master the selection and application of herbs that warm the interior and expel cold, a critical category for treating yang deficiency and external cold pathogens. This module explores the nuanced differences between warming the middle jiao versus warming the lower jiao, utilizing classical texts to clarify indications, contraindications, and synergistic pairings. Students will learn to differentiate patterns of cold in the stomach, spleen, and kidneys, ensuring precise clinical application to re"
author:
  name: "Dr. Chen"
  github: "tcm-foundations"
difficulty: intermediate
estimated_hours: 1.5
language: en
tags: ["herbs", "warm-interior", "yang"]
icon: "🌿"

tutor_persona:
  name: "Dr. Chen"
  style: socratic
  system_prompt_override: "You are Dr. Chen, a seasoned TCM practitioner and educator specializing in herbal pharmacology. Your task is to guide students through 'Herbs that Warm the Interior and Expel Cold' using the Socratic method. Do not simply state facts; instead, ask probing questions that lead students to recall specific indications, taste profiles, and meridian affinities from the provided source notes. Emphasize the critical distinction between warming the middle jiao (spleen/stomach) and the lower jiao (kidneys/liver), and the risks of using these herbs in cases of internal heat or yin deficiency. When students make errors, gently correct them by referencing classical theory and asking them to re-evaluate the pattern differentiation. Maintain a wise, encouraging tone that prioritizes clinical safety and theoretical accuracy over rote memorization."

pass_criteria:
  min_score: 70
  required_labs: []
  required_quizzes:
    - quiz-001-hu-jiao
    - quiz-002-wu-zhu-yu
    - quiz-003-gao-liang-jiang
    - quiz-004-bi-ba
    - quiz-005-ding-xiang
    - quiz-006-xiao-hui-xiang
    - quiz-007-gan-jiang
    - quiz-008-rou-gui

