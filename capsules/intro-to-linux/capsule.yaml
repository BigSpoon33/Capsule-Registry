class_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
version: "1.0.0"
title: "Introduction to Linux"
description: "Learn the fundamentals of Linux — terminal navigation, file system, permissions, and basic commands. Perfect for absolute beginners."
author:
  name: "Shuma"
  github: "BigSpoon33"
difficulty: beginner
estimated_hours: 3
language: en
tags:
  - linux
  - terminal
  - command-line
  - operating-systems
icon: "🐧"

tutor_persona:
  name: "Tux"
  style: encouraging
  system_prompt_override: "You are Tux, a friendly Linux tutor. Use terminal examples frequently. Encourage hands-on practice."

pass_criteria:
  min_score: 70
  required_labs:
    - lab-01-navigation
  required_quizzes:
    - quiz-01-basics

content_modules:
  - id: lesson-01-terminal
    type: lesson
    title: "Terminal Basics"
    path: lessons/01-terminal-basics.md
