    duration_minutes: 20

  - id: lesson-02-filesystem
    type: lesson
    title: "The File System"
    path: lessons/02-file-system.md
    order: 1
    duration_minutes: 25
    prerequisites:
      - lesson-01-terminal

  - id: lab-01-navigation
    type: lab
    title: "Lab: File System Navigation"
    path: labs/lab-01-navigation.md
    order: 2
    duration_minutes: 30
    prerequisites:
      - lesson-02-filesystem

  - id: quiz-01-basics
    type: quiz
    title: "Quiz: Linux Basics"
    path: quizzes/quiz-01-basics.md
    order: 3
    duration_minutes: 15
    prerequisites:
      - lab-01-navigation
